<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Super Batch</title>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
   <link rel="stylesheet" href="css/bootstrap.css">
   <link rel="stylesheet" href="css/variable.css">
   <link rel="stylesheet" href="css/master.css">
   <link rel="stylesheet" href="css/style.css">
   <link rel="stylesheet" href="css/responsive.css">
</head>

<body class="NoScroll">
   <section class="login-wraper noscroll-body" style="background: url(img/jungle.bg.jpg) center no-repeat; background-size: cover;">
      <div class="container">
         <div class="row">
            <div class="col-lg-12">
               <div class="loginContainer">
                  <div class="login-detailsBox animate__animated animate__bounceInLeft">
                     <img src="img/sub-logo.png" alt="" class="subLogo">
                     <div class="brandLogo animate__animated animate__heartBeat animate__delay-2s">
                        <img src="img/super-batch-logo.png" alt="">
                     </div>

                     <div class="loginTitle animate__animated animate__rubberBand animate__delay-3s animate__slow">
                        <h4>
                           <span class="sb-text-blue">F</span>
                           <span class="sb-text-purple">o</span>
                           <span class="sb-text-darkRed">r</span>
                           <span class="sb-text-green">g</span>
                           <span class="sb-text-pink">o</span>
                           <span class="sb-text-yallow">t</span>
                           <span>&nbsp;</span>
                           <span class="sb-text-blue">P</span>
                           <span class="sb-text-purple">a</span>
                           <span class="sb-text-darkRed">s</span>
                           <span class="sb-text-darkRed">s</span>
                           <span class="sb-text-green">w</span>
                           <span class="sb-text-pink">o</span>
                           <span class="sb-text-yallow">r</span>
                           <span class="sb-text-blue">d</span>
                        </h4>
                     </div>

                     <form action="" class="animate__animated animate__rubberBand animate__delay-3s animate__slow">
                        <div class="form-group">
                           <input type="email" class="form-control" placeholder="Enter your email">
                        </div>

                        <div class="login-btn-group">
                           <button type="button" class="ThemeBtn"><span>Request</span></button>
                        </div>

                        <div class="gotTo-back">
                           <p>You Don't forgot your password? <br /> back to <a href="index.html">Login</a></p>
                        </div>
                     </form>
                  </div>
                  <img src="img/login-mario.png" alt="" class="login-mario animate__animated animate__bounceInDown animate__delay-1s">
               </div>
            </div>
         </div>
      </div>
   </section>

   <script src="js/bootstrap.js"></script>
</body>

</html>
